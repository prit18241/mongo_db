<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <main class="auth-page">
        <div class="aurora aurora-one"></div>
        <div class="aurora aurora-two"></div>
        <div class="grid-glow"></div>

        <section class="auth-card register-card">
            <div class="badge">Create account</div>
            <h1>Register</h1>
            <p class="subtitle">Set up your profile in a few seconds.</p>

            <form action="/register" method="post">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose username" required>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create password" required>
                </div>

                <div class="field">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                </div>

                <button type="submit">Register</button>
            </form>

            <a class="switch-link" href="/login">Already have an account? Login here.</a>
        </section>
    </main>
</body>
</html>
